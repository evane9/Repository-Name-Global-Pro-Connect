<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pro-Connect | Private & Fast</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="title" style="margin:0;">Global Pro-Connect</h2>
            <button onclick="toggleLanguage()" style="width: auto; padding: 5px 15px; font-size: 14px; background: #333;">EN / عربي</button>
        </div>
        
        <form id="proForm">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
            <input type="text" id="role" placeholder="المسمى الوظيفي" required>
            <input type="text" id="specialty" placeholder="التخصص الدقيق" required>
            
            <div style="margin: 15px 0; text-align: right; background: #fdfdfd; padding: 12px; border-radius: 12px; border: 1px solid #eee;">
                <label id="colorLabel" style="display:block; margin-bottom:8px; font-weight:bold;">اختر لون البطاقة:</label>
                <input type="color" id="cardColor" value="#0066cc" style="width: 100%; height: 40px; border:none; cursor:pointer;">
            </div>

            <div class="image-upload-wrapper">
                <label id="imgLabel">اختر صورتك الشخصية:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <button type="submit" id="submitBtn">توليد وتحميل البطاقة فوراً</button>
        </form>
        <div id="qrcode" style="display:none;"></div>
    </div>

<script src="script.js"></script>
</body>
</html>
