<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pro-Connect | بطاقة المهندس الرقمية</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Global Pro-Connect</h2>
    <p>أدخل بياناتك للحصول على بطاقتك الاحترافية الرقمية</p>
    
    <form id="proForm">
        <input type="text" id="name" name="name" placeholder="الاسم الكامل" required>
        <input type="text" id="role" name="role" placeholder="المسمى الوظيفي (مهندس، مصنع...)" required>
        <input type="text" id="specialty" name="specialty" placeholder="التخصص" required>
        <textarea id="notes" name="notes" placeholder="تفاصيل إضافية" rows="3"></textarea>
        
        <button type="submit" id="submitBtn">إنشاء البطاقة وحفظ البيانات</button>
    </form>
    
    <div id="qrcode" style="display:none;"></div>
    
    <p class="footer-note">سيتم حفظ بياناتك وتوليد ملف PDF فوراً.</p>
</div>

<script src="script.js"></script>

</body>
</html>
